# =============================================================================
# MindLog — CI Pipeline
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  DATABASE_URL: postgresql://mindlog_test:test_pass@localhost:5432/mindlog_test
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: ci-test-jwt-secret-not-for-production
  NODE_ENV: test

jobs:
  # ---------------------------------------------------------------------------
  # TypeScript type checks — run in parallel, no DB needed
  # ---------------------------------------------------------------------------
  typecheck-api:
    name: Typecheck — API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --workspace=packages/shared --workspace=packages/db --workspace=apps/api --include-workspace-root
      - run: npm run build --workspace=packages/shared && npm run build --workspace=packages/db
      - run: npm run typecheck --workspace=apps/api

  typecheck-web:
    name: Typecheck — Web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --workspace=packages/shared --workspace=apps/web --include-workspace-root
      - run: npm run build --workspace=packages/shared
      - run: npm run typecheck --workspace=apps/web

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build --workspace=packages/shared && npm run build --workspace=packages/db
      - run: npm run lint

  # ---------------------------------------------------------------------------
  # API unit tests (requires PostgreSQL + Redis)
  # ---------------------------------------------------------------------------
  test-api:
    name: Tests — API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mindlog_test
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: mindlog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mindlog_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build --workspace=packages/shared && npm run build --workspace=packages/db
      - run: npm run db:migrate --workspace=packages/db
      - run: npm run test --workspace=apps/api

  test-web:
    name: Tests — Web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci --workspace=packages/shared --workspace=apps/web --include-workspace-root
      - run: npm run build --workspace=packages/shared
      - run: npm run test --workspace=apps/web

  # ---------------------------------------------------------------------------
  # Production build — gates merge
  # ---------------------------------------------------------------------------
  build:
    name: Build — All packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [typecheck-api, typecheck-web, test-api, test-web]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production
          VITE_API_BASE: https://placeholder.mindlog.app
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7
